<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heisser Scheiss - TheRealTeacher</title>
    <style>
        :root {
            --bg: #fcfcf9;
            --bg2: #ffffff;
            --text: #13343b;
            --muted: #626c71;
            --primary: #21808d;
            --primary-hover: #1d7480;
            --secondary: rgba(94, 82, 64, 0.12);
            --border: rgba(94, 82, 64, 0.2);
            --fire: #e67e61;
            --fire-hover: #d46b4f;
            --success: #10b981;
            --error: #ef4444;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1f2121;
                --bg2: #262828;
                --text: #f5f5f5;
                --muted: #a7a9a9;
                --primary: #32b8c6;
                --primary-hover: #2da6b2;
                --secondary: rgba(119, 124, 124, 0.15);
                --border: rgba(119, 124, 124, 0.3);
            }
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
        .header { background:var(--bg2); border-bottom:1px solid var(--border); padding:1.25rem 1.5rem; position:sticky; top:0; z-index:100; }
        .header-content { max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
        .logo-section { display:flex; align-items:center; gap:1rem; }
        .logo { width:64px; height:64px; border-radius:12px; object-fit:cover; }
        .title-section h1 { font-size:1.5rem; font-weight:700; }
        .subtitle { font-size:.875rem; color:var(--muted); }
        .status-indicator { display:inline-flex; align-items:center; gap:.5rem; font-size:.75rem; padding:.25rem .75rem; border-radius:20px; background:var(--secondary); }
        .status-dot { width:8px; height:8px; border-radius:50%; background:var(--error); }
        .status-dot.connected { background:var(--success); }
        .header-actions { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
        .btn { padding:.625rem 1.25rem; border:none; border-radius:8px; font-size:.875rem; font-weight:600; cursor:pointer; transition:.2s; display:inline-flex; align-items:center; gap:.5rem; }
        .btn-primary { background:var(--fire); color:#fff; }
        .btn-primary:hover { background:var(--fire-hover); }
        .btn-secondary { background:var(--secondary); color:var(--text); }
        .btn-secondary:hover { background:var(--primary); color:#fff; }
        .btn:disabled { opacity:.5; cursor:not-allowed; }
        .container { max-width:1400px; margin:0 auto; padding:1.5rem; }
        .config-section { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:1.25rem; margin-bottom:1.5rem; }
        .config-title { font-size:1.05rem; font-weight:700; margin-bottom:1rem; display:flex; align-items:center; gap:.5rem; }
        .config-form { display:grid; grid-template-columns: 2fr 1fr auto; gap:1rem; align-items:end; }
        .form-group label { display:block; margin-bottom:.5rem; font-weight:600; font-size:.875rem; }
        .form-group input, .form-group textarea, .form-group select { width:100%; padding:.75rem; border:1px solid var(--border); border-radius:8px; font-size:.95rem; background:var(--bg); color:var(--text); font-family:inherit; }
        .form-group textarea { min-height:120px; resize:vertical; }
        .tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; border-bottom:1px solid var(--border); overflow-x:auto; }
        .tab { padding:.75rem 1.25rem; border:none; background:none; color:var(--muted); font-size:.95rem; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
        .tab.active { color:var(--fire); border-bottom-color:var(--fire); }
        .search-box { margin-bottom:1.5rem; }
        .search-box input { width:100%; padding:.875rem 1rem; border:1px solid var(--border); border-radius:10px; font-size:.95rem; background:var(--bg2); color:var(--text); }
        .items-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1.25rem; }
        .item-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:1.25rem; cursor:pointer; transition:.2s; }
        .item-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.08); }
        .item-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.9rem; gap:.75rem; }
        .item-category { display:inline-block; padding:.25rem .7rem; border-radius:999px; font-size:.75rem; font-weight:700; }
        .category-text { background:rgba(33,128,141,.15); color:var(--primary); }
        .category-bilder { background:rgba(230,126,97,.15); color:var(--fire); }
        .category-links { background:rgba(147,51,234,.15); color:#9333ea; }
        .item-actions { display:flex; gap:.4rem; }
        .icon-btn { background:none; border:none; color:var(--muted); cursor:pointer; padding:.2rem; font-size:1rem; }
        .item-title { font-size:1.1rem; font-weight:700; margin-bottom:.5rem; }
        .item-content { color:var(--muted); font-size:.9rem; line-height:1.5; margin-bottom:1rem; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; white-space:pre-wrap; }
        .item-image { width:100%; height:180px; object-fit:cover; border-radius:10px; margin-bottom:1rem; }
        .item-link { color:var(--primary); text-decoration:none; font-size:.9rem; word-break:break-all; }
        .item-date { margin-top:.9rem; font-size:.75rem; color:var(--muted); }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; padding:1rem; }
        .modal.active { display:flex; }
        .modal-content { background:var(--bg2); border-radius:16px; max-width:620px; width:100%; max-height:90vh; overflow-y:auto; padding:1.5rem; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
        .close-btn { background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--muted); }
        .empty-state { text-align:center; padding:4rem 2rem; color:var(--muted); }
        .empty-state-icon { font-size:4rem; margin-bottom:1rem; }
        .alert { padding:1rem; border-radius:10px; margin-bottom:1rem; display:flex; align-items:center; gap:.75rem; }
        .alert-error { background:rgba(239,68,68,.1); color:var(--error); border:1px solid var(--error); }
        .alert-success { background:rgba(16,185,129,.1); color:var(--success); border:1px solid var(--success); }
        @media (max-width: 768px) {
            .header-content, .config-form { grid-template-columns:1fr; }
            .header-content { display:flex; flex-direction:column; align-items:flex-start; }
            .items-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <img src="hotstuff.png" alt="Logo" class="logo">
                <div class="title-section">
                    <h1>🔥 Heisser Scheiss</h1>
                    <div class="subtitle">TheRealTeacher Collection</div>
                </div>
            </div>
            <div class="header-actions">
                <div class="status-indicator"><span class="status-dot" id="statusDot"></span><span id="statusText">Nicht verbunden</span></div>
                <button class="btn btn-primary" onclick="openModal()" id="addBtn" disabled>➕ Neu</button>
                <button class="btn btn-secondary" onclick="exportData()" id="exportBtn" disabled>💾 Export</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="config-section">
            <div class="config-title">🔥 Heisser Scheiss Manager</div>
            <div id="alertContainer"></div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Suchen..." oninput="filterItems()">
        </div>

        <div class="tabs">
            <button class="tab active" data-category="alle" onclick="filterByCategory('alle')">📚 Alle</button>
            <button class="tab" data-category="text" onclick="filterByCategory('text')">📝 Text</button>
            <button class="tab" data-category="bilder" onclick="filterByCategory('bilder')">🖼️ Bilder</button>
            <button class="tab" data-category="links" onclick="filterByCategory('links')">🔗 Links</button>
        </div>

        <div id="itemsContainer" class="items-grid"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Neuer Eintrag</h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <form id="itemForm" onsubmit="saveItem(event)">
                <div class="form-group">
                    <label for="itemTitle">Titel *</label>
                    <input type="text" id="itemTitle" required>
                </div>
                <div class="form-group">
                    <label for="itemCategory">Kategorie *</label>
                    <select id="itemCategory" required onchange="toggleFields()">
                        <option value="">-- Wählen --</option>
                        <option value="text">📝 Text</option>
                        <option value="bilder">🖼️ Bilder</option>
                        <option value="links">🔗 Links</option>
                    </select>
                </div>
                <div class="form-group" id="contentField" style="display:none;">
                    <label for="itemContent">Anleitung/Beschreibung</label>
                    <textarea id="itemContent"></textarea>
                </div>
                <div class="form-group" id="imageField" style="display:none;">
                    <label for="itemImage">Bild hochladen</label>
                    <input type="file" id="itemImage" accept="image/*" onchange="handleImageUpload(event)">
                </div>
                <div class="form-group" id="linkField" style="display:none;">
                    <label for="itemLink">URL</label>
                    <input type="url" id="itemLink">
                </div>
                <div style="display:flex; gap:1rem; justify-content:flex-end; margin-top:1rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
                    <button type="submit" class="btn btn-primary">💾 Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let items = [];
        let currentCategory = 'alle';
        let editingId = null;
        let currentImageData = null;
        const apiEndpoint = 'api.php';
        const apiPassword = 'hotstuff';
        let isConnected = false;

        function showAlert(message, type = 'error') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<span>${type === 'error' ? '❌' : '✅'}</span><span>${message}</span>`;
            container.innerHTML = '';
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        function updateConnectionStatus(connected) {
            isConnected = connected;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const addBtn = document.getElementById('addBtn');
            const exportBtn = document.getElementById('exportBtn');
            if (connected) {
                statusDot.classList.add('connected');
                statusText.textContent = 'Verbunden';
                addBtn.disabled = false;
                exportBtn.disabled = false;
            } else {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Nicht verbunden';
                addBtn.disabled = true;
                exportBtn.disabled = true;
            }
        }

        async function testConnection() {
            try {
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'test', password: apiPassword })
                });
                const data = await response.json();
                if (data.success) {
                    updateConnectionStatus(true);
                    loadData();
                } else {
                    throw new Error(data.message || 'Verbindung fehlgeschlagen');
                }
            } catch (error) {
                updateConnectionStatus(false);
                showAlert('Verbindung fehlgeschlagen: ' + error.message, 'error');
            }
        }

        async function loadData() {
            if (!isConnected) return;
            try {
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'getAll', password: apiPassword })
                });
                const data = await response.json();
                if (data.success) {
                    items = data.items;
                    renderItems();
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                showAlert('Fehler beim Laden: ' + error.message, 'error');
            }
        }

        function openModal(id = null) {
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modalTitle');
            const form = document.getElementById('itemForm');
            if (id) {
                const item = items.find(i => i.id === id);
                if (item) {
                    editingId = id;
                    modalTitle.textContent = 'Eintrag bearbeiten';
                    document.getElementById('itemTitle').value = item.title;
                    document.getElementById('itemCategory').value = item.category;
                    document.getElementById('itemContent').value = item.content || '';
                    document.getElementById('itemLink').value = item.link || '';
                    currentImageData = item.image || null;
                    toggleFields();
                }
            } else {
                editingId = null;
                modalTitle.textContent = 'Neuer Eintrag';
                form.reset();
                currentImageData = null;
            }
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('itemForm').reset();
            editingId = null;
            currentImageData = null;
            toggleFields();
        }

        function toggleFields() {
            const category = document.getElementById('itemCategory').value;
            document.getElementById('contentField').style.display = category === 'text' ? 'block' : 'none';
            document.getElementById('imageField').style.display = category === 'bilder' ? 'block' : 'none';
            document.getElementById('linkField').style.display = category === 'links' ? 'block' : 'none';
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => currentImageData = e.target.result;
                reader.readAsDataURL(file);
            }
        }

        async function saveItem(event) {
            event.preventDefault();
            if (!isConnected) {
                showAlert('Keine Verbindung zum Server', 'error');
                return;
            }
            const title = document.getElementById('itemTitle').value;
            const category = document.getElementById('itemCategory').value;
            const content = document.getElementById('itemContent').value;
            const link = document.getElementById('itemLink').value;
            const item = {
                id: editingId || null,
                title,
                category,
                content: category === 'text' ? content : '',
                link: category === 'links' ? link : '',
                image: category === 'bilder' ? currentImageData : null
            };
            try {
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: editingId ? 'update' : 'create', item, password: apiPassword })
                });
                const data = await response.json();
                if (data.success) {
                    showAlert(editingId ? 'Eintrag aktualisiert' : 'Eintrag gespeichert', 'success');
                    await loadData();
                    closeModal();
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                showAlert('Fehler beim Speichern: ' + error.message, 'error');
            }
        }

        async function deleteItem(id) {
            if (!confirm('Wirklich löschen?')) return;
            if (!isConnected) {
                showAlert('Keine Verbindung zum Server', 'error');
                return;
            }
            try {
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'delete', id, password: apiPassword })
                });
                const data = await response.json();
                if (data.success) {
                    showAlert('Eintrag gelöscht', 'success');
                    loadData();
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                showAlert('Fehler beim Löschen: ' + error.message, 'error');
            }
        }

        function filterByCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.category === category));
            renderItems();
        }

        function filterItems() { renderItems(); }

        function renderItems() {
            const container = document.getElementById('itemsContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = items;
            if (currentCategory !== 'alle') filtered = filtered.filter(item => item.category === currentCategory);
            if (searchTerm) {
                filtered = filtered.filter(item =>
                    item.title.toLowerCase().includes(searchTerm) ||
                    (item.content && item.content.toLowerCase().includes(searchTerm)) ||
                    (item.link && item.link.toLowerCase().includes(searchTerm))
                );
            }
            if (!filtered.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔥</div><h3>Noch nix heisses hier!</h3><p>${isConnected ? 'Klick auf "Neu" um loszulegen.' : 'Bitte zuerst verbinden.'}</p></div>`;
                return;
            }
            container.innerHTML = filtered.map(item => {
                const categoryClass = 'category-' + item.category;
                const categoryLabel = { text: '📝 Text', bilder: '🖼️ Bilder', links: '🔗 Links' }[item.category];
                let contentHtml = '';
                if (item.category === 'bilder' && item.image) contentHtml = `<img src="${item.image}" alt="${item.title}" class="item-image">`;
                if (item.category === 'text' && item.content) contentHtml = `<div class="item-content">${item.content}</div>`;
                if (item.category === 'links' && item.link) contentHtml = `<a href="${item.link}" target="_blank" class="item-link" onclick="event.stopPropagation()">🔗 ${item.link}</a>`;
                return `<div class="item-card" onclick="openModal(${item.id})"><div class="item-header"><span class="item-category ${categoryClass}">${categoryLabel}</span><div class="item-actions" onclick="event.stopPropagation()"><button class="icon-btn" onclick="openModal(${item.id})" title="Bearbeiten">✏️</button><button class="icon-btn" onclick="deleteItem(${item.id})" title="Löschen">🗑️</button></div></div><h3 class="item-title">${item.title}</h3>${contentHtml}<div class="item-date">📅 ${item.created_at}</div></div>`;
            }).join('');
        }

        async function exportData() {
            if (!isConnected) {
                showAlert('Keine Verbindung zum Server', 'error');
                return;
            }
            try {
                const dataStr = JSON.stringify(items, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `heisser-scheiss-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showAlert('Export erfolgreich', 'success');
            } catch (error) {
                showAlert('Fehler beim Export: ' + error.message, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateConnectionStatus(false);
            testConnection();
        });
    </script>
</body>
</html>
